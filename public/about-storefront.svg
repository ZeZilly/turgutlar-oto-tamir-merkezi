  <!-- Ground -->
  <rect x="0" y="620" width="900" height="55" fill="#212529"/>
  <line x1="0" y1="620" x2="900" y2="620" stroke="#D4AF37" stroke-width="2"/>
  <!-- Side accents -->
  <line x1="60" y1="80" x2="60" y2="640" stroke="#D4AF37" stroke-width="3"/>
  <line x1="840" y1="80" x2="840" y2="640" stroke="#D4AF37" stroke-width="3"/>
