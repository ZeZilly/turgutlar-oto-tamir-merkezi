  <text x="100" y="520" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="600" fill="#D4AF37" letter-spacing="3">Seyhan · Adana · Anlaşmalı Sigortalar · 1 Yıl Garanti</text>
